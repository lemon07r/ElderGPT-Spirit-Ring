<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ElderGPT Spirit Ring workshop preview</title>
  <desc id="desc">A large Spirit Ring icon matching the in-game floating button.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#23232d"/>
      <stop offset="58%" stop-color="#14141b"/>
      <stop offset="100%" stop-color="#09090d"/>
    </radialGradient>
    <radialGradient id="ringFill" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1f2028" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#09090d" stop-opacity="0.98"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f3d79a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f3d79a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bgGlow)"/>
  <circle cx="512" cy="440" r="300" fill="url(#goldGlow)" filter="url(#softGlow)"/>
  <circle cx="512" cy="440" r="222" fill="#c5a059" opacity="0.08"/>
  <circle cx="512" cy="440" r="210" fill="url(#ringFill)" stroke="#c5a059" stroke-width="22" filter="url(#shadow)"/>
  <circle cx="512" cy="440" r="236" fill="none" stroke="#c5a059" stroke-opacity="0.18" stroke-width="8"/>
  <g transform="translate(512 440)">
    <circle r="76" fill="#c5a059"/>
    <path
      d="M 0 -76 A 76 76 0 1 0 0 76 A 38 38 0 1 1 0 0 A 38 38 0 1 0 0 -76 Z"
      fill="#0f1014"
    />
    <circle cy="-38" r="9" fill="#c5a059"/>
    <circle cy="38" r="9" fill="#0f1014"/>
  </g>
  <text
    x="512"
    y="810"
    text-anchor="middle"
    fill="#8f846f"
    font-size="34"
    letter-spacing="9"
    font-family="Helvetica, Arial, sans-serif"
  >ELDERGPT</text>
  <text
    x="512"
    y="892"
    text-anchor="middle"
    fill="#c5a059"
    font-size="78"
    font-weight="700"
    letter-spacing="6"
    font-family="Georgia, Times New Roman, serif"
  >SPIRIT RING</text>
</svg>
